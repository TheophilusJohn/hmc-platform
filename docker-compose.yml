version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hmc_postgres
    environment:
      POSTGRES_DB: hmc_db
      POSTGRES_USER: hmc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmc_user -d hmc_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hmc_network

  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: hmc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - hmc_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.server
    container_name: hmc_server
    environment:
      DATABASE_URL: postgresql://hmc_user:${DB_PASSWORD}@postgres:5432/hmc_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      MSG91_API_KEY: ${MSG91_API_KEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-HMC}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      WHATSAPP_BUSINESS_ID: ${WHATSAPP_BUSINESS_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      WISE_API_KEY: ${WISE_API_KEY}
      WISE_PROFILE_ID: ${WISE_PROFILE_ID}
      COPYLEAKS_EMAIL: ${COPYLEAKS_EMAIL}
      COPYLEAKS_API_KEY: ${COPYLEAKS_API_KEY}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-hmc-files}
      MINIO_USE_SSL: "false"
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - hmc_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client
    container_name: hmc_client
    restart: unless-stopped
    networks:
      - hmc_network

  nginx:
    image: nginx:alpine
    container_name: hmc_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/hmc:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - client
      - server
    restart: unless-stopped
    networks:
      - hmc_network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  hmc_network:
    driver: bridge
